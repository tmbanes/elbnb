name: CI

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ===== Backend =====
      - name: Install backend dependencies
        working-directory: ./backend
        run: pnpm install

      - name: Lint backend with ESLint
        working-directory: ./backend
        run: pnpm eslint

      - name: Format backend with Prettier
        working-directory: ./backend
        run: pnpm format

      # ===== Frontend =====
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install

      - name: Lint frontend with ESLint
        working-directory: ./frontend
        run: pnpm lint

      - name: Format frontend with Prettier
        working-directory: ./frontend
        run: pnpm format

      - name: Build frontend
        working-directory: ./frontend
        run: pnpm build